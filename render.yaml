services:
  - type: web
    name: code-atlas-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # ── Database (Supabase) ─────────────────────────────────────────────────
      - key: DATABASE_URL        # Supabase Transaction pooler URL (port 6543)
        sync: false
      - key: DIRECT_URL          # Supabase Direct connection URL (port 5432, for migrations)
        sync: false
      # ── App ────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_URL             # used to build OAuth callback URLs
        value: https://code-atlas-api.onrender.com
      # ── Auth ───────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # ── Google OAuth ────────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # ── GitHub OAuth ────────────────────────────────────────────────────────
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      # ── Email (use SendGrid / Resend / Brevo free tier in prod) ────────────
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      # ── CORS ────────────────────────────────────────────────────────────────
      - key: FRONTEND_URL        # e.g. https://your-app.vercel.app
        sync: false
      # ── Admin ───────────────────────────────────────────────────────────────
      - key: ADMIN_SECRET
        sync: false
